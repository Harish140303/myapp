{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Employee</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'employees/e_style.css' %}?v=3">
</head>
<body>

<aside>
  <div class="logo">
    <img src="{% static 'employees/images/logo.png' %}" alt="HR Portal" style="width: 140px; height: auto;">
  </div>
  <nav>
    <a href="{% url 'employee_dashboard' %}" class="active" style="background: none;">Dashboard</a>
    <a href="{% url 'add_employee' %}" style="background: rgb(59, 130, 246); color: white;">Add Employee</a>
    <a href="#">Payroll</a>
    <a href="#">Attendance</a>
    <a href="#">Settings</a>
  </nav>
</aside>

<main>
  <div class="page-header">
    <h1>Add New Employee</h1>
  </div>

  <form action="{% url 'add_employee' %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

  
    <div class="profile-row">

      
      <div class="profile-photo-card">
        <div class="avatar-circle" id="preview">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        
        </div>
            <div class="efield">
                <label>Upload Photo</label>
                <input type="file" name="photo" accept="image/*">
            </div>

        <div class="emp-name">
          <div class="efield">
            <label>First Name</label>
            <input type="text" name="first_name" required>
          </div>

          <div class="efield" style="margin-top:8px;">
            <label>Last Name</label>
            <input type="text" name="last_name" required>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Employee Details</div>

        <div class="edit-grid">
          <div class="efield">
            <label>Email</label>
            <input type="email" name="email" required>
          </div>

          <div class="efield">
            <label>Phone</label>
            <input type="text" name="phone">
          </div>

          <div class="efield">
            <label>Role</label>
            <select name="role">
              <option>Software Developer</option>
              <option>HR Manager</option>
              <option>Designer</option>
              <option>Accountant</option>
              <option>Team Lead</option>
            </select>
          </div>

          <div class="efield">
            <label>Department</label>
            <select name="department">
              <option>Engineering</option>
              <option>Human Resources</option>
              <option>Finance</option>
              <option>Marketing</option>
              <option>Operations</option>
            </select>
          </div>

          <div class="efield">
            <label>Employment Type</label>
            <select name="emp_type">
              <option>Full Time</option>
              <option>Part Time</option>
              <option>Internship</option>
            </select>
          </div>

          <div class="efield">
            <label>Join Date</label>
            <input type="date" name="join_date">
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-row">

      <div class="card">
        <div class="card-title">Personal Details</div>

        <div class="edit-grid col-1">
          <div class="efield">
            <label>DOB</label>
            <input type="date" name="dob">
          </div>

          <div class="efield">
            <label>Gender</label>
            <select name="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div class="efield">
            <label>Blood Group</label>
            <select name="blood_group">
              <option>A+</option>
              <option>B+</option>
              <option>O+</option>
              <option>AB+</option>
              <option>A-</option>
              <option>B-</option>
              <option>O-</option>
              <option>AB-</option>
            </select>
          </div>

          <div class="efield">
            <label>Address</label>
            <textarea name="address"></textarea>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Additional Info</div>

        <div class="edit-grid col-1">
          <div class="efield">
            <label>Education</label>
            <input type="text" name="education">
          </div>

          <div class="efield">
            <label>Skills</label>
            <input type="text" name="skills">
          </div>

          <div class="efield">
            <label>Hobbies</label>
            <input type="text" name="hobbies">
          </div>

          <div class="efield">
            <label>Bio</label>
            <input type="text" name="biotag">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Emergency Contact</div>

      <div class="edit-grid">
        <div class="efield">
          <label>Name</label>
          <input type="text" name="ec_name">
        </div>

        <div class="efield">
          <label>Relation</label>
          <select name="ec_relation">
            <option>Parent</option>
            <option>Spouse</option>
            <option>Friend</option>
          </select>
        </div>

        <div class="efield">
          <label>Phone</label>
          <input type="text" name="ec_phone">
        </div>

        <div class="efield">
          <label>Alt Phone</label>
          <input type="text" name="ec_alt_phone">
        </div>
      </div>
    </div>
    <div style="margin-top:20px; text-align:right;">
      <button class="btn btn-primary" type="submit">
        + Add Employee
      </button>
    </div>

  </form>
</main>

</body>
</html>
